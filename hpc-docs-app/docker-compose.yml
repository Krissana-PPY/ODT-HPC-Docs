services:
  # Node.js Backend - serves images and API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hpc-docs-backend
    restart: unless-stopped
    environment:
      - PORT=4000
      - IMAGE_DIR=/app/images
    volumes:
      - ../image:/app/images:ro
    networks:
      - hpc-docs-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SvelteKit Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hpc-docs-frontend
    restart: unless-stopped
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - hpc-docs-network

  # Nginx - HTTPS only reverse proxy (port 80 disabled)
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: hpc-docs-nginx
    restart: unless-stopped
    ports:
      - "443:443"
    depends_on:
      - frontend
    networks:
      - hpc-docs-network

networks:
  hpc-docs-network:
    driver: bridge
